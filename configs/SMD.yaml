# LC-Power 配置 - SMD 数据集

MODEL:
  NAME: LC-Power

DATA:
  NAME: SMD
  BASE_DIR: data/
  SCALE: standard
  WIN_SIZE: 100
  TRAIN_STEP: 1
  TEST_STEP: 1
  N_VAR: 38
  TRAIN_RATIO: 0.8
  DOWNSAMPLE_RATE: 1

Causal:
  ENCODER_ARCH: sparse
  TEMPERATURE: 0.1
  SIM_THRESHOLD_SCHEDULE: True
  SIM_THRESHOLD_START: 0.5
  SIM_THRESHOLD_END: 0.9
  POSITIVE_AUGMENTOR:
    ENABLE: True
    NOISE_LEVEL: 0.1
  PROJECTOR:
    INPUT_DIM: 512
    HIDDEN_DIM: 1024
    OUTPUT_DIM: 512

SPARSESETSFE:
  D_MODEL: 512
  MODEL_TYPE: mlp
  PERIOD_LEN: 10  # 对于较长序列，使用更大的周期

CUTS_PLUS:
  N_NODES: 38
  N_GROUPS: 38
  INPUT_STEP: 9

TRAIN:
  BATCH_SIZE: 64   # SMD 序列较长，使用较小的 batch size
  MAX_EPOCH: 30
  BASE_LR: 0.0001

TEST:
  THRESHOLD:
    TYPE: best_f1

SCORER:
  TYPE: l2
