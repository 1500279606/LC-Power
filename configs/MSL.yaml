# LC-Power 配置 - MSL 数据集

MODEL:
  NAME: LC-Power

DATA:
  NAME: MSL_M-1       # 第一个实体，可改为 M-1, M-2, S-2 等
  BASE_DIR: data/
  SCALE: standard
  WIN_SIZE: 10
  TRAIN_STEP: 1
  TEST_STEP: 1
  N_VAR: 55
  TRAIN_RATIO: 0.8
  DOWNSAMPLE_RATE: 1

Causal:
  ENCODER_ARCH: sparse
  TEMPERATURE: 0.1
  SIM_THRESHOLD_SCHEDULE: True
  SIM_THRESHOLD_START: 0.5
  SIM_THRESHOLD_END: 0.9
  POSITIVE_AUGMENTOR:
    ENABLE: True
    NOISE_LEVEL: 0.1
  PROJECTOR:
    INPUT_DIM: 512
    HIDDEN_DIM: 1024
    OUTPUT_DIM: 512

SPARSESETSFE:
  D_MODEL: 512
  MODEL_TYPE: mlp
  PERIOD_LEN: 2

CUTS_PLUS:
  N_NODES: 55
  N_GROUPS: 55
  INPUT_STEP: 9

TRAIN:
  BATCH_SIZE: 64      # MSL 序列较长，使用较小 batch
  MAX_EPOCH: 30
  BASE_LR: 0.0001
  WEIGHT_DECAY: 0.0001
  LR_POLICY: cosine
  WARMUP_EPOCHS: 5
  EVAL_PERIOD: 5
  PRINT_FREQ: 100
  CHECKPOINT_DIR: results/MSL

TEST:
  THRESHOLD:
    TYPE: best_f1

SCORER:
  TYPE: l2
